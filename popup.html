<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Candlelight Companion</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="app">

    <!-- Background layer -->
    <div class="background"></div>

    <!-- UI layer -->
    <div class="content">

      <div class="header card">
        Candlelight Companion
      </div>

      <div class="scene">
        <div class="sprite"></div>
      </div>
<div class="companion-message"></div>

<div class="scene"><div class="sprite"></div></div>

<div class="active-step"></div>

<form id="addStepForm">
  <input id="stepInput" type="text" />
  <button type="submit">Add</button>
</form>

<div class="queue-list"></div>

<div class="timer"></div>
<button id="startBtn"></button>
<button id="pauseBtn"></button>
<button id="resetBtn"></button>
<button id="settingsBtn">Background</button>

<div class="completion-prompt">
  <button id="markDoneBtn"></button>
  <button id="leaveOpenBtn"></button>
</div>

<div class="stats-summary"></div>
    </div>
  </div>

  <script src="script.js" defer></script>

</body>
</html>
